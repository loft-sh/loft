{{- $isEmbedded := or (include "loft.envEmbeddedK8sEnabled" .) (include "loft.configDatabaseEnabled" .) -}}

{{- if and (include "loft.multiRegionEnabled" .) (not (include "loft.configDatabaseEnabled" .)) -}}
  {{ fail "config.database.enabled must be true when multiRegion.enabled is true" }}
{{- end }}
{{- if and (include "loft.multiRegionEnabled" .) (eq (default "" .Values.multiRegion.host) "") -}}
  {{ fail "multiRegion.host must be set when multiRegion.enabled is true" }}
{{- end }}
{{- if include "loft.multiRegionEnabled" . -}}
  {{- $dataSource := "" }}
  {{- if and .Values.config .Values.config.database }}
  {{- $dataSource = .Values.config.database.dataSource | default "" | toString }}
  {{- end }}
  {{- if or (eq $dataSource "") (hasPrefix "sqlite" $dataSource) }}
  {{ fail "multiRegion requires a non-empty external data source (sqlite is not allowed)" }}
  {{- end }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "loft.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ template "loft.fullname" . }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    release: "{{ .Release.Name }}"
    heritage: "{{ .Release.Service }}"
    {{- with .Values.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- if or .Values.annotations .Values.commonAnnotations }}
  annotations:
    {{- with .Values.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.commonAnnotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  selector:
    matchLabels:
      app: {{ template "loft.fullname" . }}
      release: {{ .Release.Name }}
  replicas: {{ .Values.replicaCount }}
  strategy:
{{ include "loft.strategy" . | indent 4}}
  template:
    metadata:
      labels:
        app: {{ template "loft.fullname" . }}
        release: {{ .Release.Name }}
{{- if .Values.podLabels }}
{{ toYaml .Values.podLabels | indent 8 }}
{{- end }}
      {{- if or .Values.podAnnotations $isEmbedded }}
      annotations:
        {{- if $isEmbedded }}
        {{- if .Values.config }}
        vcluster.com/platform-config-hash: {{ toYaml .Values.config | b64enc | sha256sum | quote }}
        {{- end }}
        {{- if .Values.agentValues }}
        vcluster.com/default-agent-values-config-hash: {{ toYaml .Values.agentValues | b64enc | sha256sum | quote }}
        {{- end }}
        {{- end }}
        {{- with .Values.podAnnotations }}
{{ toYaml . | indent 8 }}
        {{- end }}
      {{- end }}
    spec:
      terminationGracePeriodSeconds: 10
      serviceAccountName: {{ template "loft.serviceAccountName" . }}
      volumes:
      {{- if .Values.volumes }}
{{ toYaml .Values.volumes | indent 8 }}
      {{- end }}
      {{- if or (and .Values.persistence .Values.persistence.enabled) (and .Values.audit .Values.audit.persistence.enabled) }}
        - name: loft-data
          persistentVolumeClaim:
            claimName: {{ template "loft.fullname" . }}-audit
      {{- else }}
        - name: loft-data
          emptyDir: {}
      {{- end }}
      {{- if and .Values.additionalCA (not .Values.insecureSkipVerify) }}
        - name: loft-additional-ca
          secret:
            secretName: loft-additional-ca
      {{- end }}
      containers:
      - name: manager
        {{- if .Values.agentOnly }}
        command: ["loft", "agent"]
        {{- end }}
        image: {{ include "loft.image" . }}
        {{- if .Values.imagePullPolicy }}
        imagePullPolicy: {{ .Values.imagePullPolicy }}
        {{- end }}
        ports:
          - name: http
            containerPort: 8080
          - name: https
            containerPort: 10443
          - name: https-webhook
            containerPort: 9443
          - name: http-wakeup
            containerPort: 9090
        {{- if .Values.livenessProbe }}
        {{- if .Values.livenessProbe.enabled }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          failureThreshold: 30
          initialDelaySeconds: 5
          periodSeconds: 5
        {{- end }}
        {{- end }}
        {{- if .Values.readinessProbe }}
        {{- if .Values.readinessProbe.enabled }}
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          failureThreshold: 30
          initialDelaySeconds: 5
          periodSeconds: 5
        {{- end }}
        {{- end }}
        env:
        {{- if not .Values.admin.create }}
        - name: ADMIN_SKIP_CREATE
          value: "true"
        {{- end }}
        - name: ADMIN_EMAIL
          value: {{ .Values.admin.email | quote }}
        - name: CHART_VERSION
          value: {{ .Chart.Version }}
        {{- if .Values.admin.password }}
        {{- if hasPrefix "$" .Values.admin.password }}
        - name: ADMIN_PASSWORD_ENV
          value: {{ .Values.admin.password }}
        {{- else }}
        - name: ADMIN_PASSWORD_HASH
          value: {{ .Values.admin.password | sha256sum | quote }}
        {{- end }}
        {{- end }}
        {{- if .Values.admin.username }}
        - name: ADMIN_USERNAME
          value: {{ .Values.admin.username | quote }}
        {{- end }}
        {{- if (gt (int .Values.replicaCount) 1) }}
        {{- if not (and .Values.env .Values.env.LEADER_ELECTION_ENABLED) }}
        - name: LEADER_ELECTION_ENABLED
          value: "true"
        {{- end }}
        {{- else if or (include "loft.multiRegionEnabled" .) (include "loft.configDatabaseEnabled" .) }}
        - name: LEADER_ELECTION_ENABLED
          value: "true"
        {{- end }}
        {{- range $key, $value := .Values.envValueFrom }}
        - name: {{ $key | quote }}
          valueFrom:
{{ toYaml $value | indent 12 }}
        {{- end }}
        {{- if .Values.tls }}
        {{- if .Values.tls.enabled }}
        - name: PROXY_TLS_CERT
          valueFrom:
            secretKeyRef:
              name: {{ .Values.tls.secret }}
              key: {{ .Values.tls.crtKey }}
        - name: PROXY_TLS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.tls.secret }}
              key: {{ .Values.tls.keyKey }}
        {{- end }}
        {{- end }}
        {{- if .Values.logging }}
        - name: LOFT_LOG_ENCODING
          value: {{ default "console" .Values.logging.encoding }}
        - name: LOFT_LOG_LEVEL
          value: {{ default "info" .Values.logging.level }}
        {{- end }}
        {{- if .Values.insecureSkipVerify }}
        - name: TS_DEBUG_TLS_DIAL_INSECURE_SKIP_VERIFY
          value: "true"
        {{- end }}
        {{- if not (hasKey .Values.env "LOFT_MANAGER_IMAGE") }}
        - name: LOFT_MANAGER_IMAGE
          value: {{ include "loft.image" . | quote }}
        {{- end }}
        {{- if $isEmbedded }}
        {{- if .Values.config }}
        - name: LOFT_MANAGER_CONFIG
          valueFrom:
            secretKeyRef:
              name: loft-manager-config
              key: config
        {{- end }}
        {{- if .Values.agentValues }}
        - name: LOFT_DEFAULT_AGENT_VALUES
          valueFrom:
            secretKeyRef:
              name: loft-default-agent-values
              key: values
        {{- end }}
        {{- end }}
        {{- if include "loft.configDatabaseEnabled" . }}
        - name: LOFT_EMBEDDED_K8S
          value: "true"
        - name: LOFT_EMBEDDED_K8S_DATA_SOURCE
          value: {{ .Values.config.database.dataSource | quote }}
        {{- if .Values.config.database.identityProvider }}
        - name: LOFT_EMBEDDED_K8S_DATA_SOURCE_IDENTITY_PROVIDER
          value: {{ .Values.config.database.identityProvider | quote }}
        {{- end }}
        {{- if .Values.config.database.caFile }}
        - name: LOFT_EMBEDDED_K8S_DATA_SOURCE_CA_FILE
          value: {{ .Values.config.database.caFile | quote }}
        {{- end }}
        {{- if .Values.config.database.keyFile }}
        - name: LOFT_EMBEDDED_K8S_DATA_SOURCE_KEY_FILE
          value: {{ .Values.config.database.keyFile | quote }}
        {{- end }}
        {{- if .Values.config.database.certFile }}
        - name: LOFT_EMBEDDED_K8S_DATA_SOURCE_CERT_FILE
          value: {{ .Values.config.database.certFile | quote }}
        {{- end }}
        {{- $otherArgs := list }}
        {{- range .Values.config.database.extraArgs }}
        {{- if hasPrefix "--datastore-max-open-connections=" . }}
        - name: LOFT_EMBEDDED_K8S_MAX_DATABASE_CONNECTIONS
          value: {{ trimPrefix "--datastore-max-open-connections=" . | quote }}
        {{- else if hasPrefix "--datastore-max-idle-connections=" . }}
        - name: LOFT_EMBEDDED_K8S_MAX_IDLE_CONNECTIONS
          value: {{ trimPrefix "--datastore-max-idle-connections=" . | quote }}
        {{- else }}
        {{- $otherArgs = append $otherArgs . }}
        {{- end }}
        {{- end }}
        {{- if $otherArgs }}
        - name: LOFT_EMBEDDED_K8S_DATABASE_EXTRA_ARGS
          value: {{ toJson $otherArgs | quote }}
        {{- end }}
        {{- end }}
        {{- if include "loft.multiRegionEnabled" . }}
        {{- if .Values.config.loftHost }}
        - name: LOFT_HOST
          value: {{ .Values.config.loftHost | quote }}
        {{- end }}
        - name: LOFT_MULTI_REGION_PLATFORM
          value: "true"
        - name: LOFT_MULTI_REGION_PLATFORM_HOST
          value: {{ .Values.multiRegion.host | quote }}
        {{- if .Values.multiRegion.region }}
        - name: LOFT_MULTI_REGION_PLATFORM_REGION
          value: {{ .Values.multiRegion.region | quote }}
        {{- end }}
        {{- end }}
        {{- if (eq true (dig "leastPrivilegeMode" "enabled" false .Values.agentValues)) }}
        - name: LOFT_AGENT_VALUES_LPM_ENABLED
          value: "true"
        {{- end }}
        {{- if (and .Values.agentOnly (include "loft.isLeastPrivilegeModeEnabled" .)) }}
        {{- $lpmValues := include "loft.leastPrivilegeModeValues" . | fromJson }}
        - name: LOFT_LPM_ENABLED
          value: "true"
        {{- if eq false $lpmValues.clusterAccess.enabled }}
        - name: LOFT_LPM_CLUSTER_ACCESS_ENABLED
          value: "false"
        {{- end }}
        {{- if eq false $lpmValues.projectQuotas.enabled }}
        - name: LOFT_LPM_PROJECT_QUOTAS_ENABLED
          value: "false"
        {{- end }}
        {{- if eq false $lpmValues.secrets.enabled }}
        - name: LOFT_LPM_SECRETS_ENABLED
          value: "false"
        {{- end }}
        {{- if eq false $lpmValues.sleepMode.enabled }}
        - name: LOFT_LPM_SLEEP_MODE_ENABLED
          value: "false"
        {{- end }}
        {{- if eq true $lpmValues.namespaceAdminRole.enabled }}
        - name: LOFT_LPM_NAMESPACE_ADMIN_ROLE_ENABLED
          value: "true"
        {{- end }}
        {{- end }}
        - name: LOFT_AGENT_SERVICE_ACCOUNT_NAME
          value: {{ template "loft.serviceAccountName" . }}
        {{- range $key, $value := .Values.env }}
        - name: {{ $key | quote }}
          value: {{ $value | quote }}
        {{- end }}
        volumeMounts:
        {{- if .Values.volumeMounts }}
{{ toYaml .Values.volumeMounts | indent 10 }}
        {{- end }}
          - mountPath: /var/lib/loft
            name: loft-data
        {{- if and .Values.additionalCA (not .Values.insecureSkipVerify) }}
          - name: loft-additional-ca
            mountPath: /etc/ssl/certs/loft-additional-ca.crt
            readOnly: true
            subPath: ca.crt
        {{- end }}
        resources:
{{ toYaml .Values.resources | indent 10 }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 | replace "enabled: true" "" | replace "enabled: false" "" }}
      {{- if .Values.audit }}
      {{- if .Values.audit.enableSideCar }}
      - name: audit
        image: {{ include "loft.auditImage" . }}
        command: ["sh"]
        args: ["-c", "touch /var/lib/loft/audit.log && tail -F /var/lib/loft/audit.log"]
        volumeMounts:
        - mountPath: /var/lib/loft
          name: loft-data
        securityContext:
          {{- toYaml .Values.audit.securityContext | nindent 12 }}
      {{- end }}
      {{- end }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
{{ toYaml .Values.nodeSelector | indent 8 }}
      {{- end }}

      {{- $preferredSchedulingTerms := list -}}
      {{- if and .Values.affinity.nodeAffinity.preferNotToRunOnSpotInstances .Values.affinity.nodeAffinity.preferNotToRunOnSpotInstances.enabled }}
        {{- range $index, $term := .Values.affinity.nodeAffinity.preferNotToRunOnSpotInstances.terms -}}
          {{- $preferredSchedulingTerms = append $preferredSchedulingTerms $term -}}
        {{- end }}
      {{- end }}
      {{- range $index, $term := .Values.affinity.nodeAffinity.preferredDuringSchedulingIgnoredDuringExecution -}}
        {{- $preferredSchedulingTerms = append $preferredSchedulingTerms $term -}}
      {{- end }}
      {{- if  or .Values.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution $preferredSchedulingTerms .Values.affinity.podAffinity .Values.affinity.podAntiAffinity }}
      affinity:
        {{- if  or .Values.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution $preferredSchedulingTerms }}
        nodeAffinity:
          {{- if $preferredSchedulingTerms  }}
          preferredDuringSchedulingIgnoredDuringExecution:
{{ toYaml $preferredSchedulingTerms | indent 12 }}
          {{- end }}
          {{- if .Values.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution }}
          requiredDuringSchedulingIgnoredDuringExecution:
{{ toYaml .Values.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution | indent 12 }}
          {{- end }}
        {{- end }}
        {{- if or .Values.affinity.podAffinity }}
        podAffinity:
{{ toYaml .Values.affinity.podAffinity | indent 10 }}
        {{- end }}
        {{- if or .Values.affinity.podAntiAffinity }}
        podAntiAffinity:
{{ toYaml .Values.affinity.podAntiAffinity | indent 10 }}
        {{- end }}
      {{- end }}

      {{- if .Values.tolerations }}
      tolerations:
{{ toYaml .Values.tolerations | indent 8 }}
      {{- end }}
      {{- if .Values.hostAliases }}
      hostAliases:
{{ toYaml .Values.hostAliases | indent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
